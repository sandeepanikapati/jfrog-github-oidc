name: Build and Push Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt update
          sudo apt install -y podman buildah

      - name: Create Buildx-like builder
        run: |
          # Podman uses buildah for building images
          podman system connection add --default mybuilder unix:///run/user/1000/podman/podman.sock

      - name: Build Docker image using Podman and export tar
        run: |
          podman build \
            --arch=amd64 \
            --tag myapp:latest \
            --file Dockerfile \
            --format docker \
            --quiet .
          podman save -o image.tar myapp:latest

      - name: Upload image tar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-image
          path: image.tar

  push_image:
    runs-on: ubuntu-latest
    needs: build_image
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: built-image
          path: .

      - name: Log in to JFrog Podman registry
        run: |
          podman login hts2-girigithub-oci-local.jfrog.io \
            -u ${{ secrets.JFROG_USERNAME }} \
            -p ${{ secrets.JFROG_PASSWORD }}

      - name: Load Podman image from tar
        id: load_image
        run: |
          podman load --input image.tar
          echo "image_name=myapp:latest" >> $GITHUB_OUTPUT

      - name: Tag & Push canonical tag
        id: push_canonical
        run: |
          SOURCE_IMAGE="${{ steps.load_image.outputs.image_name }}"
          TARGET_REPO="hts2-girigithub-oci-local.jfrog.io/myapp"
          CANONICAL_TAG="$TARGET_REPO:v1.2.3-linux-amd64"

          echo "Pushing canonical tag: $CANONICAL_TAG"
          podman tag "$SOURCE_IMAGE" "$CANONICAL_TAG"
          podman push "$CANONICAL_TAG"

          # Extract digest
          DIGEST=$(podman inspect --format='{{index .RepoDigests 0}}' "$CANONICAL_TAG" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
