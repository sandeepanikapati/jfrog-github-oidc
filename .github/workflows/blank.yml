name: Build and Push Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_image:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker 20.10.24
        run: |
          sudo apt-get remove -y docker docker-engine docker.io containerd runc || true

          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg lsb-release

          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker.gpg

          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker.gpg] \
            https://download.docker.com/linux/ubuntu \
            jammy stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

          sudo apt-get update
          sudo apt-get install -y \
            docker-ce=5:20.10.24~3-0~ubuntu-jammy \
            docker-ce-cli=5:20.10.24~3-0~ubuntu-jammy \
            containerd.io

          docker version

      - name: Create Buildx builder
        run: docker buildx create --use

      - name: Build Docker image and export tar
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -t myapp:latest \
            --output type=docker,dest=./image.tar .

      - name: Upload image tar
        uses: actions/upload-artifact@v4
        with:
          name: built-image
          path: image.tar

  push_image:
    runs-on: ubuntu-22.04
    needs: build_image
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: built-image
          path: .

      - name: Install Docker 20.10.24
        run: |
          sudo apt-get remove -y docker docker-engine docker.io containerd runc || true
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg lsb-release

          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker.gpg

          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker.gpg] \
            https://download.docker.com/linux/ubuntu \
            jammy stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

          sudo apt-get update
          sudo apt-get install -y \
            docker-ce=5:20.10.24~3-0~ubuntu-jammy \
            docker-ce-cli=5:20.10.24~3-0~ubuntu-jammy \
            containerd.io

          docker version

      - name: Log in to JFrog
        run: |
          docker login hts2-girigithub-oci-local.jfrog.io \
            -u ${{ secrets.JFROG_USERNAME }} \
            --password ${{ secrets.JFROG_PASSWORD }}

      - name: Load image
        id: load_image
        run: |
          docker load --input image.tar
          echo "image_name=myapp:latest" >> $GITHUB_OUTPUT

      - name: Tag & Push
        run: |
          TARGET="hts2-girigithub-oci-local.jfrog.io/myapp:v1.2.3-linux-amd64"
          docker tag myapp:latest "$TARGET"
          docker push "$TARGET"
