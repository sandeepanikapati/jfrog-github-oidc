name: Build and Push Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker 20.10.24
        run: |
          sudo apt-get remove -y docker docker-engine docker.io containerd runc || true

          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            gnupg \
            lsb-release

          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker.gpg

          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker.gpg] \
            https://download.docker.com/linux/ubuntu \
            $(lsb_release -cs) stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

          sudo apt-get update
          sudo apt-get install -y \
            docker-ce=5:20.10.24~3-0~ubuntu-$(lsb_release -cs) \
            docker-ce-cli=5:20.10.24~3-0~ubuntu-$(lsb_release -cs) \
            containerd.io

          docker version

      - name: Create Buildx builder
        run: docker buildx create --use

      - name: Build Docker image using BuildKit and export tar
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -t myapp:latest \
            --output type=docker,dest=./image.tar .

      - name: Upload image tar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-image
          path: image.tar

  push_image:
    runs-on: ubuntu-latest
    needs: build_image
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: built-image
          path: .

      - name: Install Docker 20.10.24
        run: |
          sudo apt-get remove -y docker docker-engine docker.io containerd runc || true

          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            gnupg \
            lsb-release

          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker.gpg

          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker.gpg] \
            https://download.docker.com/linux/ubuntu \
            $(lsb_release -cs) stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

          sudo apt-get update
          sudo apt-get install -y \
            docker-ce=5:20.10.24~3-0~ubuntu-$(lsb_release -cs) \
            docker-ce-cli=5:20.10.24~3-0~ubuntu-$(lsb_release -cs) \
            containerd.io

          docker version

      - name: Log in to JFrog Docker registry
        run: |
          docker login hts2-girigithub-oci-local.jfrog.io \
            -u ${{ secrets.JFROG_USERNAME }} \
            --password ${{ secrets.JFROG_PASSWORD }}

      - name: Load Docker image from tar
        id: load_image
        run: |
          docker load --input image.tar
          echo "image_name=myapp:latest" >> $GITHUB_OUTPUT

      - name: Tag & Push canonical tag
        id: push_canonical
        run: |
          SOURCE_IMAGE="${{ steps.load_image.outputs.image_name }}"
          TARGET_REPO="hts2-girigithub-oci-local.jfrog.io/myapp"
          CANONICAL_TAG="$TARGET_REPO:v1.2.3-linux-amd64"

          docker tag "$SOURCE_IMAGE" "$CANONICAL_TAG"
          docker push "$CANONICAL_TAG"

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$CANONICAL_TAG" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
